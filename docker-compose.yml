services:
  # ─── Ollama LLM (qwen2.5:1.5b) ───
  ollama:
    image: ollama/ollama:latest
    container_name: jalguard-ollama
    # No host port needed — only ml-backend connects via Docker network
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # ─── Pull the model after Ollama starts ───
  ollama-pull:
    image: curlimages/curl:latest
    container_name: jalguard-ollama-pull
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: >
      sh -c "curl -s http://ollama:11434/api/pull -d '{\"name\": \"qwen2.5:1.5b\"}' && echo 'Model pulled successfully'"
    restart: "no"

  # ─── Python ML Backend (Flask + gTTS + Ollama chat) ───
  ml-backend:
    build:
      context: ./jal-ML
      dockerfile: Dockerfile
    container_name: jalguard-backend
    # No host port needed — nginx proxies to ml-backend via Docker network
    environment:
      - PORT=5001
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=qwen2.5:1.5b
      - OLLAMA_TIMEOUT_SEC=45
      - OLLAMA_KEEP_ALIVE=30m
      - OLLAMA_NUM_PREDICT=120
      - OLLAMA_NUM_CTX=1024
      - OLLAMA_TEMPERATURE=0.4
      - OLLAMA_TOP_P=0.9
      - CHAT_MAX_HISTORY=6
      - CHAT_HISTORY_CHAR_LIMIT=500
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/tts/languages"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Flutter Web + Nginx (serves app + proxies API) ───
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jalguard-web
    ports:
      - "9090:80"
    depends_on:
      ml-backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  ollama_data:
