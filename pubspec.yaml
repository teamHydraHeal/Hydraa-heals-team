name: jal_guard
description: AI-powered public health command center mobile application

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.1
  
  # Navigation
  go_router: ^12.1.3
  
  # UI Components
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  
  # Maps and Location
  google_maps_flutter: ^2.5.0
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  
  # Local Storage and Offline
  sqflite: ^2.3.0
  shared_preferences: ^2.2.2
  connectivity_plus: ^5.0.2
  path_provider: ^2.1.1
  path: ^1.8.3
  
  # HTTP and API
  http: ^1.1.2
  dio: ^5.4.0
  
  # Notifications
  firebase_core: ^2.24.2
  firebase_messaging: ^14.7.10
  flutter_local_notifications: ^16.3.2
  
  # Image Handling
  image_picker: ^1.0.4
  
  # Utilities
  intl: ^0.19.0
  uuid: ^4.2.1
  crypto: ^3.0.3
  encrypt: ^5.0.1
  logger: ^2.0.2+1
  
  # AI/ML (for demo purposes)
  tflite_flutter: ^0.10.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/translations/
