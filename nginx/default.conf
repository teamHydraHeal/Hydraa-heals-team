server {
    listen 80;
    server_name _;

    # Serve Flutter web build
    root /usr/share/nginx/html;
    index index.html;

    # Flutter web — SPA routing (all paths fall back to index.html)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy ML backend API calls to the backend container
    location /predict {
        proxy_pass http://ml-backend:5001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /chat {
        proxy_pass http://ml-backend:5001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    location /summarize {
        proxy_pass http://ml-backend:5001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    location /tts {
        proxy_pass http://ml-backend:5001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    location /translate {
        proxy_pass http://ml-backend:5001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /ollama {
        proxy_pass http://ml-backend:5001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript application/wasm;
    gzip_min_length 1000;
}
